<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/INVICTUS_LOGO.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set Password — Invictus IMC</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --void: #0A0A0A;
      --gold: #C8860A;
      --gold-light: #E09B12;
      --gold-border: rgba(200,134,10,0.3);
      --white: #FFFFFF;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'Outfit', sans-serif;
    }
    body { font-family: var(--sans); background: var(--void); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .box { width: 100%; max-width: 420px; }
    .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 48px; text-decoration: none; }
    .logo img { width: 32px; height: 32px; object-fit: contain; }
    .logo-name { font-family: var(--serif); font-size: 16px; font-weight: 600; letter-spacing: 2.5px; color: var(--white); text-transform: uppercase; display: block; line-height: 1; }
    .logo-tag { font-size: 8px; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; display: block; margin-top: 3px; }
    h1 { font-family: var(--serif); font-size: 36px; font-weight: 400; color: var(--white); margin-bottom: 8px; }
    h1 em { font-style: italic; color: var(--gold); }
    .sub { font-size: 13px; font-weight: 300; color: rgba(255,255,255,0.38); margin-bottom: 36px; line-height: 1.6; }
    .form-group { margin-bottom: 20px; }
    .form-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.4); display: block; margin-bottom: 8px; }
    .form-input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); color: var(--white); font-family: var(--sans); font-size: 14px; font-weight: 300; padding: 14px 16px; transition: border-color 0.2s; outline: none; }
    .form-input:focus { border-color: var(--gold-border); }
    .form-input::placeholder { color: rgba(255,255,255,0.2); }
    .btn { width: 100%; background: var(--gold); border: none; color: var(--void); font-family: var(--sans); font-size: 13px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; padding: 16px; cursor: pointer; transition: background 0.2s; margin-top: 8px; }
    .btn:hover { background: var(--gold-light); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg { padding: 14px 16px; margin-bottom: 20px; font-size: 13px; font-weight: 300; display: none; line-height: 1.6; }
    .msg.error { background: rgba(231,76,60,0.12); border: 1px solid rgba(231,76,60,0.3); color: #e74c3c; }
    .msg.success { background: rgba(46,125,50,0.12); border: 1px solid rgba(46,125,50,0.3); color: #81C784; }
    .msg.show { display: block; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(0,0,0,0.3); border-top-color: var(--void); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="box">
    <a href="/" class="logo">
      <img src="/INVICTUS_LOGO-NO_BG.png" alt="Invictus IMC" />
      <div>
        <span class="logo-name">Invictus IMC</span>
        <span class="logo-tag">Member Portal</span>
      </div>
    </a>

    <div id="view-set">
      <h1>Set your <em>password.</em></h1>
      <p class="sub">Choose a password for your IMC member account. You'll use this to sign in going forward.</p>
      <div class="msg" id="msg"></div>
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" class="form-input" id="password" placeholder="Minimum 8 characters" />
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-input" id="confirm" placeholder="Repeat your password" onkeydown="if(event.key==='Enter') doSet()" />
      </div>
      <button class="btn" id="btn-set" onclick="doSet()">Set Password & Sign In</button>
    </div>

    <div id="view-invalid" style="display:none;">
      <h1>Link <em>expired.</em></h1>
      <p class="sub">This invite or reset link has expired or already been used. Request a new one from your account manager.</p>
      <a href="/login" style="display:block;text-align:center;margin-top:24px;color:var(--gold);font-size:13px;text-decoration:none;letter-spacing:1px;">← Back to Sign In</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supa = window.supabase.createClient(
      'https://nmjkzhquoxuuebzyotnx.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5tamt6aHF1b3h1dWVienlvdG54Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNzY0MDEsImV4cCI6MjA5MTY1MjQwMX0.6uwyWMSLGhG259TY9x-vpUxNiENkYAXOqFEUI3aSv5M'
    );

    // Supabase puts the session tokens in the URL hash on invite/reset links
    async function init() {
      const hash = window.location.hash;

      // Check for error in hash
      if (hash.includes('error=')) {
        document.getElementById('view-set').style.display = 'none';
        document.getElementById('view-invalid').style.display = 'block';
        return;
      }

      // Supabase v2 automatically handles the hash and establishes session
      const { data: { session }, error } = await supa.auth.getSession();

      if (!session && !hash.includes('access_token')) {
        document.getElementById('view-set').style.display = 'none';
        document.getElementById('view-invalid').style.display = 'block';
      }
    }

    function showMsg(type, text) {
      const el = document.getElementById('msg');
      el.className = 'msg ' + type + ' show';
      el.textContent = text;
    }

    async function doSet() {
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;

      if (!password || password.length < 8) {
        showMsg('error', 'Password must be at least 8 characters.');
        return;
      }
      if (password !== confirm) {
        showMsg('error', 'Passwords do not match.');
        return;
      }

      const btn = document.getElementById('btn-set');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Setting password...';

      const { data, error } = await supa.auth.updateUser({ password });

      if (error) {
        btn.disabled = false;
        btn.textContent = 'Set Password & Sign In';
        showMsg('error', error.message);
        return;
      }

      showMsg('success', 'Password set successfully. Signing you in...');

      // Get profile to redirect to right portal
      setTimeout(async () => {
        const { data: { session } } = await supa.auth.getSession();
        if (session) {
          const { data: profile } = await supa.from('profiles').select('role').eq('id', session.user.id).single();
          const role = profile?.role || 'buyer';
          window.location.href = role === 'manufacturer' ? '/manufacturer-portal' : '/buyer-portal';
        } else {
          window.location.href = '/login';
        }
      }, 1500);
    }

    init();
  </script>
</body>
</html>
